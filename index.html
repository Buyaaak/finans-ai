<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finans AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0a; color: #e0e0e0; display: flex; height: 100vh; overflow: hidden; }

    /* SIDEBAR */
    .sidebar { width: 240px; background: #111; border-right: 1px solid #222; display: flex; flex-direction: column; padding: 16px; gap: 8px; }
    .logo { display: flex; align-items: center; gap: 8px; padding: 8px 0 16px; font-weight: 700; font-size: 16px; color: #fff; }
    .logo-icon { width: 28px; height: 28px; background: #22c55e; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 13px; color: #000; }
    .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #555; padding: 8px 4px 4px; }
    .mode-btn { padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #aaa; display: flex; align-items: center; gap: 8px; border: none; background: none; width: 100%; text-align: left; }
    .mode-btn:hover { background: #1a1a1a; color: #fff; }
    .mode-btn.active { background: #1c3a2b; color: #22c55e; }
    .divider { height: 1px; background: #222; margin: 8px 0; }

    /* UPLOAD */
    .upload-area { border: 1.5px dashed #333; border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
    .upload-area:hover { border-color: #22c55e; }
    .upload-area .arrow { font-size: 20px; color: #555; margin-bottom: 6px; }
    .upload-area p { font-size: 12px; color: #555; }
    .upload-area p span { color: #22c55e; font-weight: 600; }
    .upload-area .types { font-size: 11px; color: #444; margin-top: 4px; }
    #file-input { display: none; }

    /* FILE LIST */
    .file-list { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; max-height: 160px; overflow-y: auto; }
    .file-item { display: flex; align-items: center; gap: 6px; background: #1a1a1a; border-radius: 6px; padding: 6px 8px; font-size: 11px; color: #aaa; }
    .file-item .badge { background: #c0392b; color: #fff; font-size: 9px; font-weight: 700; padding: 1px 4px; border-radius: 3px; flex-shrink: 0; }
    .file-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-item .remove { cursor: pointer; color: #555; font-size: 14px; line-height: 1; flex-shrink: 0; }
    .file-item .remove:hover { color: #e55; }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .messages { flex: 1; overflow-y: auto; padding: 32px 40px; display: flex; flex-direction: column; gap: 20px; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* MESSAGES */
    .msg { display: flex; gap: 12px; max-width: 760px; }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg-avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .msg.ai .msg-avatar { background: #22c55e; color: #000; }
    .msg.user .msg-avatar { background: #3b82f6; color: #fff; }
    .msg-bubble { background: #1a1a1a; border-radius: 12px; padding: 12px 16px; font-size: 14px; line-height: 1.6; color: #ddd; max-width: 640px; }
    .msg.user .msg-bubble { background: #1e3a5f; }

    /* TYPING */
    .typing-dots { display: flex; gap: 4px; padding: 4px 0; }
    .typing-dots span { width: 6px; height: 6px; background: #555; border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* INPUT */
    .input-area { padding: 16px 40px 24px; border-top: 1px solid #1a1a1a; }
    .input-box { display: flex; gap: 10px; background: #151515; border: 1px solid #2a2a2a; border-radius: 12px; padding: 10px 14px; align-items: flex-end; }
    #msg-input { flex: 1; background: none; border: none; outline: none; color: #e0e0e0; font-size: 14px; resize: none; max-height: 120px; line-height: 1.5; font-family: inherit; }
    #msg-input::placeholder { color: #444; }
    .send-btn { width: 34px; height: 34px; background: #22c55e; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s; }
    .send-btn:hover { background: #16a34a; }
    .send-btn svg { width: 16px; height: 16px; fill: #000; }
    .send-btn:disabled { background: #2a2a2a; cursor: not-allowed; }
    .send-btn:disabled svg { fill: #555; }

    /* EMPTY STATE */
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #444; }
    .empty-state .icon { font-size: 40px; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="logo">
    <div class="logo-icon">B</div>
    Finans AI
  </div>

  <div class="section-label">MOD</div>
  <button class="mode-btn active" onclick="setMode(this, 'pdf')">📄 PDFlerim</button>
  <button class="mode-btn" onclick="setMode(this, 'gundem')">🌐 Gündem</button>
  <button class="mode-btn" onclick="setMode(this, 'ikisi')">⚡ İkisi</button>

  <div class="divider"></div>
  <div class="section-label">BELGELER</div>

  <div class="upload-area" onclick="document.getElementById('file-input').click()">
    <div class="arrow">↑</div>
    <p><span>Tıkla</span> veya sürükle bırak</p>
    <div class="types">PDF · XLSX · CSV</div>
  </div>
  <input type="file" id="file-input" multiple accept=".pdf,.xlsx,.csv" onchange="handleFiles(this.files)"/>

  <div class="file-list" id="file-list"></div>
</div>

<div class="main">
  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <div class="icon">💬</div>
      <p>Sorunuzu yazın...</p>
    </div>
  </div>
  <div class="input-area">
    <div class="input-box">
      <textarea id="msg-input" rows="1" placeholder="Sorunuzu yazın..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
  let mode = 'pdf';
  let uploadedFiles = [];
  let conversationHistory = [];

  function setMode(btn, m) {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = m;
  }

  function handleFiles(files) {
    for (const file of files) {
      if (!uploadedFiles.find(f => f.name === file.name)) {
        uploadedFiles.push(file);
        renderFileList();
      }
    }
  }

  function renderFileList() {
    const list = document.getElementById('file-list');
    list.innerHTML = uploadedFiles.map((f, i) => `
      <div class="file-item">
        <span class="badge">PDF</span>
        <span class="name">${f.name}</span>
        <span class="remove" onclick="removeFile(${i})">×</span>
      </div>
    `).join('');
  }

  function removeFile(i) {
    uploadedFiles.splice(i, 1);
    renderFileList();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function addMessage(role, content) {
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="msg-avatar">${role === 'ai' ? 'AI' : 'SEN'}</div>
      <div class="msg-bubble">${content}</div>
    `;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function showTyping() {
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typing';
    div.innerHTML = `<div class="msg-avatar">AI</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;

    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });

    showTyping();

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-opus-4-5',
          max_tokens: 1024,
          system: 'Sen bir finans analistleri asistanısın. Kullanıcıların finans, yatırım ve ekonomi sorularını Türkçe olarak yanıtlarsın.',
          messages: conversationHistory
        })
      });

      const data = await response.json();
      removeTyping();

      const reply = data?.content?.[0]?.text || 'Bir hata oluştu.';
      conversationHistory.push({ role: 'assistant', content: reply });
      addMessage('ai', reply.replace(/\n/g, '<br>'));
    } catch (err) {
      removeTyping();
      addMessage('ai', 'Bağlantı hatası. Lütfen tekrar deneyin.');
    }

    document.getElementById('send-btn').disabled = false;
  }
</script>
</body>
</html>
